version: '3.8'

services:

  app:
    build: .
    container_name: varo_app
    ports:
      - "5175:5173"
    volumes:
      - .:/var/www
    networks:
      - laravel

  webserver:
    image: nginx:alpine
    container_name: varo_nginx
    ports:
      - "9090:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: postgres:15-alpine
    container_name: varo_db
    environment:
      POSTGRES_DB: varo-db
      POSTGRES_USER: varouser
      POSTGRES_PASSWORD: varopass$
    ports:
      - "5433:5432"
    volumes:
      - varo_db_data:/var/lib/postgresql/data
    networks:
      - laravel

networks:
  laravel:

volumes:
  varo_db_data:
